name: Congress Trade Notifier

# Runs the poller on a schedule on GitHub's servers — no cloud account, no card.
# Dedup state (data/seen.json + data/alert_history.json) is committed back to the
# repo after each run, so the repo itself is the "database".
on:
  schedule:
    # Hourly at :23 (UTC). Deliberately OFF the top of the hour: scheduled runs
    # at :00 are the most likely to be delayed or dropped because that's GitHub's
    # busiest slot. A quiet minute is far more reliable on the free tier. Hourly
    # stays well under the Actions-minutes budget, and disclosures lag ~45 days so
    # finer polling gains nothing.
    - cron: '23 * * * *'
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

# Allow the job to push the updated state files back to the repo.
permissions:
  contents: write

# Shared with the backfill workflow so no two jobs push to the repo at once.
concurrency:
  group: stock-trader-writer
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # --omit=optional skips @google-cloud/storage (only used for the GCP path).
      - run: npm ci --omit=optional

      - name: Poll for new congressional trades
        env:
          DATA_PROVIDER: ${{ secrets.DATA_PROVIDER }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_SYMBOLS: ${{ secrets.FINNHUB_SYMBOLS }}
          WATCH_POLITICIANS: ${{ secrets.WATCH_POLITICIANS }}
          TRADE_TYPES: ${{ secrets.TRADE_TYPES }}
          MIN_TRADE_VALUE: ${{ secrets.MIN_TRADE_VALUE }}
          MONTHLY_REPORT_MIN_VALUE: ${{ secrets.MONTHLY_REPORT_MIN_VALUE }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMS_ENABLED: ${{ secrets.SMS_ENABLED }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          SMS_TO: ${{ secrets.SMS_TO }}
          SMS_VIA_EMAIL: ${{ secrets.SMS_VIA_EMAIL }}
          SMS_EMAIL_ADDRESS: ${{ secrets.SMS_EMAIL_ADDRESS }}
        run: node src/index.js --once

      # Refresh the performance index. Prices come from Yahoo (free, no quota), so
      # warming new-trade tickers here no longer competes with the FMP-based poll.
      # Also refreshes the Divergence (Hypocrisy) Score artifacts as a best-effort
      # final step inside performance.js.
      - name: Refresh performance index
        env:
          PERF_MAX_FETCHES: '40'
          DATA_PROVIDER: ${{ secrets.DATA_PROVIDER }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          VOTES_PROVIDER: ${{ secrets.VOTES_PROVIDER }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          # Tiingo fallback for delisted/acquired tickers (no-op if the secret is unset).
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: node src/performance.js || true

      - name: Persist dedup state back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -f because data/*.json are gitignored for local hygiene; in CI we
          # deliberately track them so state survives between runs. Add each file
          # separately — alert_history.json may not exist yet, and a single
          # `git add a b` aborts (staging nothing) if any path is missing.
          git add -f data/seen.json 2>/dev/null || true
          git add -f data/alert_history.json 2>/dev/null || true
          git add -f data/report_state.json 2>/dev/null || true
          git add -f data/source_marker.json 2>/dev/null || true
          git add -f data/sectors.json 2>/dev/null || true
          git add -f data/legislators.json 2>/dev/null || true
          git add -f data/committees_historical.json 2>/dev/null || true
          git add -f data/performance.json 2>/dev/null || true
          git add -f data/performance.md 2>/dev/null || true
          git add -f docs/positions.json 2>/dev/null || true
          git add -f data/divergence.json 2>/dev/null || true
          git add -f data/divergence.md 2>/dev/null || true
          git add -f docs/divergence.json 2>/dev/null || true
          git add -f data/votes_cache.json 2>/dev/null || true
          git add -f data/price_cache.json 2>/dev/null || true
          git add -f data/tracked_trades.json 2>/dev/null || true
          git add -f data/backfill_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            # Never commit conflict markers — they corrupt docs/positions.json and
            # hang the site. Fail loudly rather than publishing a corrupted file.
            if git diff --cached | grep -qE '^\+(<<<<<<<|>>>>>>>)'; then
              echo "::error::Conflict markers staged — refusing to persist corrupted state"; exit 1
            fi
            git commit -m "chore: update trade state [skip ci]"
            # Our state is now captured in the commit; make the rest of the tree
            # pristine so `git pull --rebase` won't refuse on leftover changes.
            # (Safe: this is the job's last step, so cleaning node_modules is fine.)
            git checkout -f -- . 2>/dev/null || true
            git clean -fdq 2>/dev/null || true
            # Land our commit on top of whatever is on main now, retrying the race
            # window (a concurrent job or a manual push lands between checkout and
            # push). These are all regenerated artifacts, so on a content conflict
            # keep OUR fresh version: -X theirs — in a rebase "theirs" is the commit
            # being replayed (ours). On any OTHER rebase failure, ABORT — otherwise
            # git is left mid-rebase in detached HEAD and the push dies with
            # "not currently on a branch" (exactly what failed the 7am run).
            pushed=0
            for i in 1 2 3 4 5; do
              if git pull --rebase -X theirs origin main && git push; then
                echo "pushed on attempt $i"; pushed=1; break
              fi
              git rebase --abort 2>/dev/null || true
              git checkout -f -- . 2>/dev/null || true
              git clean -fdq 2>/dev/null || true
              sleep $((RANDOM % 8 + 4))
            done
            if [ "$pushed" != "1" ]; then
              echo "::error::could not persist state after retries (concurrent writes)"; exit 1
            fi
          fi
