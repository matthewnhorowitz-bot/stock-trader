name: Backfill History

# Advances the historical trade backfill (Senate eFD + House Clerk PDFs) a batch at a
# time, on GitHub's servers, and reprices. Resumable via data/backfill_state.json.
#
# TEMPORARY CATCH-UP MODE: cron is bumped to every 15 min and Senate is re-enabled
# back to the STOCK Act (2012) to walk in the historical range fast. Once coverage
# stabilizes (data/tracked_trades.json stops growing, pre-2019 positions priced, ~1-2
# days), revert to the steady state: cron '37 */4 * * *' and BACKFILL_SENATE_BATCH '0'
# (new Senate trades arrive via the live alert feed; this job keeps appending House PTRs).
on:
  schedule:
    - cron: '*/15 * * * *' # CATCH-UP: every 15 min (revert to '37 */4 * * *' when done)
  workflow_dispatch: {}

permissions:
  contents: write

# Shared with the notifier workflow so the two never push at the same time.
concurrency:
  group: stock-trader-writer
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --omit=optional
      # OCR toolchain for scanned pre-2020 House PTRs (rasterize + OCR).
      - name: Install OCR tools (poppler + tesseract)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils tesseract-ocr
      - name: Backfill a batch
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BACKFILL_SENATE_BATCH: '250' # CATCH-UP: walk Senate back to 2012 (set '0' when done)
          BACKFILL_SENATE_SINCE: '01/01/2012' # STOCK Act era
          BACKFILL_HOUSE_BATCH: '500'
          BACKFILL_HOUSE_YEARS: '2014,2015,2016,2017,2018,2019,2023,2024,2025,2026'
          OCR_ENABLED: '1' # OCR scanned 2014-2019 House PTRs
          BACKFILL_HOUSE_OCR_MAX: '40' # bound slow OCR per run (~5-15s/PDF); stays resumable
          PRICE_FROM: '2012-01-01'
        run: node src/backfill.js || true
      # Warm the price cache (Yahoo, free/no-quota) for newly-backfilled tickers and
      # refresh the index. Generous budget — Yahoo has no daily quota.
      - name: Warm prices + refresh performance
        env:
          PERF_MAX_FETCHES: '600'
          PRICE_FROM: '2012-01-01'
        run: node src/performance.js || true
      - name: Persist backfill data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add -f data/tracked_trades.json data/backfill_state.json
          git add -f data/price_cache.json data/performance.json data/performance.md
          git add -f data/sectors.json data/legislators.json data/committees_historical.json
          git add -f docs/positions.json
          if git diff --cached --quiet; then
            echo "No new backfill data."
          else
            # Guard: a prior `pull --rebase --autostash` can leave stash-pop conflict
            # markers in the generated files, which `git add -f` above would stage.
            # Never commit those — they corrupt positions.json and break the site.
            # Fail loudly instead; the next scheduled run retries from a clean tree.
            if git diff --cached | grep -qE '^\+(<<<<<<<|>>>>>>>)'; then
              echo "::error::Conflict markers in staged files — aborting to avoid corrupting state"; exit 1
            fi
            git commit -m "chore: backfill batch [skip ci]"
            git push
          fi
